name: RealtimeInterpretationHost
options:
  minimumXcodeGenVersion: 2.43.0
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 6.0
packages:
  RealtimeInterpretationDemo:
    path: ../ios26_demo
targets:
  RealtimeInterpretationHost:
    type: application
    platform: iOS
    deploymentTarget: "26.4"
    sources:
      - path: App
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Realtime Interpretation
        INFOPLIST_KEY_NSMicrophoneUsageDescription: Microphone access is required for live speech translation.
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.tastyheadphones.RealtimeInterpretationHost
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: RealtimeInterpretationDemo
        product: RealtimeInterpretationDemo
